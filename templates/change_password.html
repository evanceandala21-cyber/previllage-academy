<!DOCTYPE html>
<html>
<head>
<title>Change Password</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h2>Change Password</h2>

{% if message %}
<p style="color:green;">
{{ message }}
</p>
{% endif %}

<form method="POST">

<input type="password"
       name="old_password"
       placeholder="Current Password"
       required>

<input type="password"
       name="new_password"
       placeholder="New Password"
       required>

<button type="submit">
Change Password
</button>

</form>

<br>

<a href="/teacher_dashboard">
Back
</a>

</div>

</body>
</html>
