<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="student-page"></body>

<h2>Student Login</h2>
{% if message %}
<p style="color:red; text-align:center;">
    {{ message }}
</p>
{% endif %}

<form method="POST">
<input name="admission" placeholder="Admission">
<input name="year_birth" placeholder="Year of Birth">
<button>View Results</button>
</form>

</body>
</html>
