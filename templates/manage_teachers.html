<!DOCTYPE html>
<html>
<head>
<title>Manage Teachers</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Manage Teachers</h1>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Username</th>
<th>Action</th>
</tr>

{% for t in teachers %}
<tr>
<td>{{ t[0] }}</td>
<td>{{ t[1] }}</td>
<td>{{ t[2] }}</td>
<td>
<a href="/delete_teacher/{{ t[0] }}">Delete</a>
</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/add_teacher">Add Teacher</a>
<br><br>

<a href="/admin_dashboard">Back</a>

</body>
</html>
