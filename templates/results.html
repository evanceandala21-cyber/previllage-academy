<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>All Uploaded Results</h1>

<table>
<tr>
    <th>ID</th>
    <th>Admission</th>
    <th>Subject</th>
    <th>Marks</th>
</tr>

{% for r in results %}
<tr>
    <td>{{ r[0] }}</td>
    <td>{{ r[1] }}</td>
    <td>{{ r[2] }}</td>
    <td>{{ r[3] }}</td>
</tr>
{% endfor %}

</table>

<br>
<a href="/admin_dashboard">Back to Dashboard</a>

</body>
</html>
